events {
    worker_connections 512;
}

http {
    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream sotang_api {
        server api:8000;
        keepalive 32;
    }

    # ── Timeouts y buffers (ajustados para Raspberry Pi 5) ───────────────────
    proxy_connect_timeout       60s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;
    client_max_body_size        15M;   # adjuntos hasta 10MB + overhead

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;  # acepta cualquier hostname (Tailscale IP o MagicDNS)

        # ── API ───────────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://sotang_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ── Health check (bypass auth) ────────────────────────────────────────
        location /health {
            proxy_pass http://sotang_api;
            access_log off;
        }

        # ── Docs (solo en dev / acceso interno) ──────────────────────────────
        location /api/docs {
            proxy_pass http://sotang_api;
        }

        location /api/redoc {
            proxy_pass http://sotang_api;
        }

        # ── Bloquear acceso directo a archivos sensibles ──────────────────────
        location ~ /\. {
            deny all;
        }
    }
}
